<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b202b"/>
      <stop offset="1" stop-color="#10131a"/>
    </linearGradient>
  </defs>
  <!-- app tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- soft green glow behind the cube -->
  <ellipse cx="32" cy="36" rx="21" ry="14" fill="#00d26a" opacity="0.12"/>

  <!-- isometric grass block -->
  <!-- left face (shadow side) -->
  <polygon points="14,25 32,34 32,52 14,43" fill="#6d4525"/>
  <!-- right face (lit side) -->
  <polygon points="50,25 32,34 32,52 50,43" fill="#96613a"/>
  <!-- dirt pixel speckles, aligned to each face's plane -->
  <polygon points="20,33 24,35 24,39 20,37" fill="#5a3a1e"/>
  <polygon points="25,42 28,43.5 28,47 25,45.5" fill="#7d5028"/>
  <polygon points="40,40 44,38 44,42 40,44" fill="#b3743f"/>
  <polygon points="36,46 39,44.5 39,48 36,49.5" fill="#a96c3c"/>
  <!-- grass overhang strips on the side faces -->
  <polygon points="14,25 32,34 32,37.5 14,28.5" fill="#00a857"/>
  <polygon points="50,25 32,34 32,37.5 50,28.5" fill="#00bf63"/>
  <!-- top face -->
  <polygon points="32,16 50,25 32,34 14,25" fill="#00d26a"/>
  <!-- top pixel highlights -->
  <polygon points="26,21 30,23 26,25 22,23" fill="#7df5b4"/>
  <polygon points="40,23.5 43,25 40,26.5 37,25" fill="#4ae996"/>
</svg>
