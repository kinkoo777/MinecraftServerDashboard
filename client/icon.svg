<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- isometric grass block, transparent background -->
  <!-- left face (shadow side) -->
  <polygon points="4,18 32,32 32,60 4,46" fill="#6d4525"/>
  <!-- right face (lit side) -->
  <polygon points="60,18 32,32 32,60 60,46" fill="#96613a"/>
  <!-- dirt pixel speckles, aligned to each face's plane -->
  <polygon points="13,30 19,33 19,39 13,36" fill="#5a3a1e"/>
  <polygon points="22,44 27,46.5 27,52 22,49.5" fill="#7d5028"/>
  <polygon points="45,38 51,35 51,41 45,44" fill="#b3743f"/>
  <polygon points="36,48 40,46 40,52 36,54" fill="#a96c3c"/>
  <!-- grass overhang strips on the side faces -->
  <polygon points="4,18 32,32 32,37.5 4,23.5" fill="#00a857"/>
  <polygon points="60,18 32,32 32,37.5 60,23.5" fill="#00bf63"/>
  <!-- top face -->
  <polygon points="32,4 60,18 32,32 4,18" fill="#00d26a"/>
  <!-- top pixel highlights -->
  <polygon points="22,12 28,15 22,18 16,15" fill="#7df5b4"/>
  <polygon points="42,15.5 47,18 42,20.5 37,18" fill="#4ae996"/>
</svg>
