<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- dark rounded app tile -->
  <rect width="64" height="64" rx="14" fill="#171a21"/>
  <!-- dirt body -->
  <rect x="12" y="12" width="40" height="40" fill="#9a6438"/>
  <!-- grass cap: two full pixel rows + notched edge -->
  <rect x="12" y="12" width="40" height="10" fill="#00d26a"/>
  <rect x="12" y="22" width="5" height="5" fill="#00d26a"/>
  <rect x="22" y="22" width="10" height="5" fill="#00d26a"/>
  <rect x="37" y="22" width="5" height="5" fill="#00d26a"/>
  <rect x="47" y="22" width="5" height="5" fill="#00d26a"/>
  <!-- grass highlights -->
  <rect x="17" y="12" width="5" height="5" fill="#5cf0a3"/>
  <rect x="42" y="17" width="5" height="5" fill="#5cf0a3"/>
  <!-- dirt texture: dark and light speckles -->
  <rect x="27" y="27" width="5" height="5" fill="#7a4e2a"/>
  <rect x="17" y="37" width="5" height="5" fill="#7a4e2a"/>
  <rect x="37" y="42" width="5" height="5" fill="#7a4e2a"/>
  <rect x="42" y="32" width="5" height="5" fill="#b3743f"/>
  <rect x="22" y="42" width="5" height="5" fill="#b3743f"/>
</svg>
