<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChunkDeck</title>
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <img src="icon.svg" class="logo-img" alt="">
      <span>ChunkDeck</span>
    </div>
    <nav id="nav">
      <a href="#" data-page="dashboard"><span class="icon"></span> Dashboard</a>
      <a href="#history" data-page="history"><span class="icon"></span> History</a>
      <a href="#console" data-page="console"><span class="icon"></span> Console</a>
      <a href="#players" data-page="players"><span class="icon"></span> Players</a>
      <a href="#settings" data-page="settings"><span class="icon"></span> Settings</a>
      <a href="#world" data-page="world"><span class="icon"></span> World</a>
      <a href="#tunnel" data-page="tunnel"><span class="icon"></span> Play Online</a>
      <a href="#files" data-page="files"><span class="icon"></span> Files</a>
      <a href="#plugins" data-page="plugins"><span class="icon"></span> Plugins</a>
      <a href="#schedules" data-page="schedules"><span class="icon"></span> Schedules</a>
    </nav>
    <div class="sidebar-status">
      <span id="side-status-dot" class="dot offline"></span>
      <span id="side-status-text">Offline</span>
      <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark theme"></button>
      <button id="logout-btn" class="theme-toggle" style="margin-left:4px" title="Log out"></button>
    </div>
    <a id="report-bug" class="sidebar-report" href="https://github.com/kinkoo777/MinecraftServerDashboard/issues/new" target="_blank" rel="noopener" title="Found a bug? Report it on GitHub">
      <span id="report-bug-icon" class="icon"></span> Report a bug
    </a>
  </aside>

  <main id="content"></main>
  <div id="player-modal-root"></div>
  <div id="toasts"></div>

  <script src="js/app.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/dashboard-layout.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/dashboard-chart.js"></script>
  <script src="js/history.js"></script>
  <script src="js/console.js"></script>
  <script src="js/players.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/world.js"></script>
  <script src="js/tunnel.js"></script>
  <script src="js/files.js"></script>
  <script src="js/plugins.js"></script>
  <script src="js/schedules.js"></script>
  <script>
    App.init();
    // Register the service worker and auto-reload open tabs when a new build ships, so
    // an update (or restart) never leaves the browser stuck on a stale, half-broken UI.
    if ('serviceWorker' in navigator) {
      // Whether this page was already controlled at load. On a first-ever visit the SW
      // claims the page (controllerchange fires) but there's no *new* version to show —
      // only reload when an already-controlled tab gets a newer SW.
      const hadController = !!navigator.serviceWorker.controller;
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing || !hadController) return;
        refreshing = true;
        location.reload();
      });
      // updateViaCache:'none' forces the browser to revalidate sw.js instead of serving
      // it from the HTTP cache, so a new service worker is detected promptly.
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' })
        .then(reg => reg.update())
        .catch(() => {});
    }
  </script>
</body>
</html>
